name: Acquire Unity activation file

# One-time helper for a Personal (free) Unity license — no serial needed.
# Run it manually (Actions tab -> this workflow -> "Run workflow"), download the
# "Manual Activation File" artifact (a Unity_v6000.5.0f1.alf), then:
#   1. Go to https://license.unity3d.com/manual and sign in with your Unity ID.
#   2. Upload the .alf; on the license-type screen pick "Unity Personal Edition"
#      (answer the revenue/usage question) — this does NOT ask for a serial.
#   3. Download the resulting .ulf, open it in a text editor, copy ALL of it, and
#      paste it into the repo secret UNITY_LICENSE (Settings -> Secrets and variables -> Actions).
# Also add UNITY_EMAIL and UNITY_PASSWORD secrets. Then tests.yml can run.
# Personal licenses expire periodically; re-run this + re-exchange to refresh UNITY_LICENSE.

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request .alf
    runs-on: ubuntu-latest
    steps:
      - uses: game-ci/unity-request-activation-file@v2
        id: getManualLicenseFile
        with:
          unityVersion: 6000.5.0f1

      - uses: actions/upload-artifact@v4
        with:
          name: Manual Activation File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
