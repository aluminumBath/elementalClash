name: Unity license — how to activate (Personal)

# GameCI v4 no longer uses an activation-file workflow (the old .alf action is deprecated).
# For a free Personal license you activate LOCALLY in Unity Hub, which creates a .ulf file, then
# paste that file into the UNITY_LICENSE secret. No .alf, no license.unity3d.com, no serial.
#
# Steps:
#   1. Unity Hub > Preferences (gear) > Licenses > Add > "Get a free personal license".
#      (You must click Add and finish — otherwise the .ulf is not written.)
#   2. Open the generated license file:
#        Windows: C:\ProgramData\Unity\Unity_lic.ulf   (ProgramData is hidden — paste the path in Explorer)
#        macOS:   /Library/Application Support/Unity/Unity_lic.ulf
#        Linux:   ~/.local/share/unity3d/Unity/Unity_lic.ulf
#   3. GitHub > repo > Settings > Secrets and variables > Actions, add:
#        UNITY_LICENSE  = the full contents of Unity_lic.ulf
#        UNITY_EMAIL    = your Unity account email
#        UNITY_PASSWORD = your Unity account password
#   4. tests.yml already consumes those. This file is just a reminder and can be deleted.
# Docs: https://game.ci/docs/github/activation

on:
  workflow_dispatch:

jobs:
  info:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Activate a free Personal license in Unity Hub (Preferences > Licenses > Add > Get a free personal license),"
          echo "then paste C:\\ProgramData\\Unity\\Unity_lic.ulf into the UNITY_LICENSE secret. See https://game.ci/docs/github/activation"
