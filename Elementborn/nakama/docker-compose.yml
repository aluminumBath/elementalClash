# Local Nakama dev server for Elementborn.
# Usage:  cd nakama && docker compose up
# Console: http://127.0.0.1:7351   (default login: admin / password)
# Client connects to 127.0.0.1:7350 with server key "defaultkey".
#
# This is a development setup. Change passwords and the server key before exposing it anywhere.
#
# Event logs → Neon: the events_ingest RPC writes to whatever DB Nakama uses. To send logs to Neon, set
# NAKAMA_DB_ADDRESS to your Neon **direct** DSN (NOT the -pooler host — Nakama keeps its own pool and the
# PgBouncer pooler breaks prepared statements). Put it in an untracked nakama/.env, e.g.:
#   NAKAMA_DB_ADDRESS=neondb_owner:YOUR_PASSWORD@ep-ancient-darkness-atetic57.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
# Never commit the password. Rotate it in the Neon console if it has ever been shared. Default below is local.

version: "3"
services:
  cockroachdb:
    image: cockroachdb/cockroach:latest-v23.1
    command: start-single-node --insecure --store=attrs=ssd,path=/var/lib/cockroach/
    restart: unless-stopped
    volumes:
      - data:/var/lib/cockroach
    expose:
      - "8080"
      - "26257"
    ports:
      - "26257:26257"
      - "8080:8080"

  nakama:
    image: heroiclabs/nakama:latest
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address ${NAKAMA_DB_ADDRESS:-root@cockroachdb:26257} &&
        exec /nakama/nakama --name nakama1
        --database.address ${NAKAMA_DB_ADDRESS:-root@cockroachdb:26257}
        --logger.level DEBUG
        --session.token_expiry_sec 7200
        --socket.server_key defaultkey
        --runtime.js_entrypoint "build/index.js"
    restart: unless-stopped
    links:
      - "cockroachdb:db"
    depends_on:
      - cockroachdb
    volumes:
      - ./:/nakama/data
    expose:
      - "7349"
      - "7350"
      - "7351"
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"

volumes:
  data:
